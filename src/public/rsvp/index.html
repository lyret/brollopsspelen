<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OSA — Bröllopsspelen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="../style.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: var(--space-xl) var(--space-md);
    }

    .back {
      align-self: flex-start;
      font-size: 0.9rem;
      color: var(--text-dim);
      text-decoration: none;
      letter-spacing: 0.05em;
      margin-bottom: var(--space-lg);
    }

    .back:hover {
      color: var(--text);
    }

    .wrap {
      width: 100%;
      max-width: 520px;
    }

    header {
      text-align: center;
      margin-bottom: var(--space-lg);
    }

    h1 {
      font-size: clamp(1.5rem, 4vw, 2.1rem);
      font-weight: 400;
      letter-spacing: 0.04em;
      margin-bottom: 0.5rem;
    }

    header p {
      font-style: italic;
      color: var(--text-dim);
      font-size: 1rem;
      line-height: 1.7;
    }

    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: var(--space-lg) 0;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    label {
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    input[type="text"],
    input[type="tel"],
    input[type="email"],
    textarea {
      font-family: var(--font);
      font-size: 1rem;
      color: var(--text);
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      border-radius: 0;
      outline: none;
      padding: 0.4rem 0;
      width: 100%;
      transition: border-color 0.15s;
    }

    input:focus,
    textarea:focus {
      border-bottom-color: var(--text);
    }

    input::placeholder,
    textarea::placeholder {
      color: var(--border);
      font-style: italic;
    }

    input:-webkit-autofill,
    input:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0 1000px var(--bg) inset;
      -webkit-text-fill-color: var(--text);
    }

    textarea {
      border: 1px solid var(--border);
      padding: 0.5rem 0.6rem;
      resize: vertical;
      min-height: 80px;
      line-height: 1.6;
    }

    textarea:focus {
      border-color: var(--text);
    }

    .field--check {
      flex-direction: row;
      align-items: flex-start;
      gap: 0.6rem;
      cursor: pointer;
    }

    .field--check input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 1rem;
      height: 1rem;
      min-width: 1rem;
      border: 1px solid var(--border);
      background: transparent;
      cursor: pointer;
      position: relative;
      top: 0.25em;
      transition: border-color 0.15s, background 0.15s;
    }

    .field--check input[type="checkbox"]:checked {
      background: var(--text);
      border-color: var(--text);
    }

    .field--check input[type="checkbox"]:checked::after {
      content: '';
      display: block;
      width: 0.3rem;
      height: 0.55rem;
      border: 2px solid var(--bg);
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translate(1px, -1px);
      margin: auto;
      position: absolute;
      inset: 0;
    }

    .field--check label {
      font-size: 0.95rem;
      letter-spacing: 0;
      text-transform: none;
      color: var(--text);
      cursor: pointer;
    }

    #extra-guests {
      display: none;
    }

    .note {
      font-size: 0.85rem;
      font-style: italic;
      color: var(--text-dim);
      line-height: 1.5;
    }

    button[type="submit"] {
      font-family: var(--font);
      font-size: 0.9rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--bg);
      background: var(--text);
      border: none;
      padding: 0.85rem 2rem;
      cursor: pointer;
      align-self: flex-start;
      transition: opacity 0.15s;
      margin-top: var(--space-sm);
    }

    button[type="submit"]:hover {
      opacity: 0.75;
    }
  </style>
</head>
<body>
  <a class="back" href="/">← Tillbaka</a>

  <div class="wrap">
    <header>
      <h1>Katrin & Viktor</h1>
      <p>Vi hoppas att du kan komma.<br>Fyll i formuläret nedan för att anmäla dig.</p>
    </header>

    <hr />

    <form action="https://formspree.io/f/xeenydqz" method="POST">
      <input type="hidden" name="_subject" value="OSA — Bröllopsspelen" />

      <div class="field">
        <label for="name">Ditt namn *</label>
        <input type="text" id="name" name="name" required autocomplete="name" />
      </div>

      <div class="field">
        <label for="phone">Telefonnummer *</label>
        <input type="tel" id="phone" name="phone" required autocomplete="tel" />
      </div>

      <div class="field">
        <label for="email">E-postadress</label>
        <input type="email" id="email" name="email" autocomplete="email" />
      </div>

      <hr />

      <label class="field--check">
        <input type="checkbox" id="multiple" name="multiple" />
        <span>Jag anmäler flera personer och/eller barn</span>
      </label>

      <div class="field" id="extra-guests">
        <label for="guests">Övriga gäster</label>
        <textarea id="guests" name="guests" placeholder="Ett namn per rad"></textarea>
        <p class="note">Om du önskar ta med en +1 som inte är inbjuden, hör av dig till oss istället.</p>
      </div>

      <button type="submit">Skicka OSA</button>
    </form>
  </div>

  <script>
    document.getElementById('multiple').addEventListener('change', function () {
      document.getElementById('extra-guests').style.display = this.checked ? 'flex' : 'none';
    });
  </script>
</body>
</html>
