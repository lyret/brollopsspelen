<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OSA — Bröllopsspelen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="../style.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: var(--space-xl) var(--space-md);
    }

    .back {
      align-self: flex-start;
      font-size: 0.9rem;
      color: var(--text-dim);
      text-decoration: none;
      letter-spacing: 0.05em;
      margin-bottom: var(--space-lg);
    }

    .back:hover { color: var(--text); }

    .wrap {
      width: 100%;
      max-width: 520px;
    }

    header {
      text-align: center;
      margin-bottom: var(--space-lg);
    }

    h1 {
      font-size: clamp(1.5rem, 4vw, 2.1rem);
      font-weight: 400;
      letter-spacing: 0.04em;
      margin-bottom: 0.5rem;
    }

    header p {
      font-style: italic;
      color: var(--text-dim);
      font-size: 1rem;
      line-height: 1.7;
    }

    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: var(--space-lg) 0;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: var(--space-md);
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    label {
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    input[type="text"],
    input[type="tel"],
    input[type="email"] {
      font-family: var(--font);
      font-size: 1rem;
      color: var(--text);
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      border-radius: 0;
      outline: none;
      padding: 0.4rem 0;
      width: 100%;
      transition: border-color 0.15s;
    }

    input:focus { border-bottom-color: var(--text); }

    input::placeholder { color: var(--border); font-style: italic; }

    input:-webkit-autofill,
    input:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0 1000px var(--bg) inset;
      -webkit-text-fill-color: var(--text);
    }

    textarea {
      font-family: var(--font);
      font-size: 1rem;
      color: var(--text);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 0;
      outline: none;
      padding: 0.5rem 0.6rem;
      width: 100%;
      line-height: 1.8;
      resize: none;
      overflow: hidden;
      min-height: 2.8rem;
      transition: border-color 0.15s;
    }

    textarea::placeholder { color: var(--border); font-style: italic; }
    textarea:focus { border-color: var(--text); }

    .note {
      font-size: 0.85rem;
      font-style: italic;
      color: var(--text-dim);
      line-height: 1.5;
    }

    button[type="submit"] {
      font-family: var(--font);
      font-size: 0.9rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--bg);
      background: var(--text);
      border: none;
      padding: 0.85rem 2rem;
      cursor: pointer;
      align-self: flex-start;
      transition: opacity 0.15s;
      margin-top: var(--space-sm);
    }

    button[type="submit"]:hover { opacity: 0.75; }
  </style>
</head>
<body>
  <a class="back" href="/">← Framsidan</a>

  <div class="wrap">
    <header>
      <h1>Katrin & Viktor</h1>
      <p>Vi hoppas att <span data-s="du" data-p="ni">du</span> kan komma.<br>Fyll i formuläret nedan för att anmäla <span data-s="dig" data-p="er">dig</span>.</p>
    </header>

    <hr />

    <form action="https://formspree.io/f/xeenydqz" method="POST">
      <input type="hidden" name="_subject" value="OSA — Bröllopsspelen" />

      <div class="field">
        <label for="participants">Deltagare — ett namn per rad *</label>
        <textarea id="participants" name="participants" placeholder="Anna Andersson" required rows="1"></textarea>
        <p class="note" id="participants-note" style="display:none">Om <span data-s="du" data-p="någon av er">du</span> önskar ta med en +1 som inte är inbjuden, hör av dig till oss.</p>
      </div>

      <hr />

      <div class="field">
        <label for="phone">Telefonnummer *</label>
        <input type="tel" id="phone" name="phone" required autocomplete="tel" />
      </div>

      <div class="field">
        <label for="email">E-postadress</label>
        <input type="email" id="email" name="email" autocomplete="email" />
      </div>

      <button type="submit">Skicka OSA</button>
    </form>
  </div>

  <script>
    const textarea = document.getElementById('participants');
    const note = document.getElementById('participants-note');
    let participantCount = 0;

    function update() {
      const lines = textarea.value.split('\n').filter(function(l) { return l.trim().length > 0; });
      participantCount = lines.length;

      // Auto-grow
      textarea.style.height = 'auto';
      textarea.style.height = textarea.scrollHeight + 'px';

      // Show +1 note once someone has typed anything
      note.style.display = textarea.value.trim().length > 0 ? 'block' : 'none';

      // Swap pronouns
      const plural = participantCount > 1;
      document.querySelectorAll('[data-s]').forEach(function(el) {
        el.textContent = plural ? el.dataset.p : el.dataset.s;
      });
    }

    textarea.addEventListener('input', update);
  </script>
</body>
</html>
